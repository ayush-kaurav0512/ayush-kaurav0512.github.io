<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Ayush Kaurav × Company</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent: #00C9A7;
  --accent-dim: rgba(0,201,167,0.09);
  --accent-border: rgba(0,201,167,0.22);
  --cream: #F4F0E8;
  --ink: #0D0D0B;
  --ink2: #2A2A27;
  --muted: #7A7770;
  --line: rgba(13,13,11,0.09);
  --line2: rgba(13,13,11,0.05);
  --white: #FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Instrument Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
.cur{
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  position:fixed;top:0;left:0;pointer-events:none;
  z-index:9999;transform:translate(-50%,-50%);
  transition:width .18s,height .18s;
  mix-blend-mode:multiply;
}
.cur.big{width:38px;height:38px}

/* PROGRESS */
.prog{position:fixed;top:0;left:0;right:0;height:2px;background:var(--line2);z-index:100}
.prog-fill{height:100%;background:var(--accent);width:0%;transition:width .08s}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;
  padding:18px 52px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:90;
  background:rgba(244,240,232,0.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line2);
}
.nav-left{display:flex;align-items:center;gap:6px}
.nav-back{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--muted);
  text-decoration:none;letter-spacing:0.06em;
  display:flex;align-items:center;gap:6px;
  transition:color .2s;
}
.nav-back:hover{color:var(--ink)}
.nav-sep{color:var(--line);font-size:14px}
.nav-brand{
  font-family:'DM Mono',monospace;
  font-size:12px;font-weight:500;
  letter-spacing:0.05em;
  color:var(--ink);
}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-pill{
  font-family:'DM Mono',monospace;
  font-size:10px;padding:4px 10px;
  border-radius:100px;letter-spacing:0.06em;
  background:var(--accent-dim);color:var(--accent);
  border:1px solid var(--accent-border);
}
.nav-email{
  font-size:12px;font-weight:500;
  padding:7px 16px;border-radius:100px;
  background:var(--ink);color:var(--cream);
  text-decoration:none;transition:all .15s;
}
.nav-email:hover{background:var(--accent);transform:translateY(-1px)}

/* SLIDE BASE */
.slide{
  min-height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:110px 52px 72px;
  border-bottom:1px solid var(--line);
  opacity:0;transform:translateY(24px);
  transition:opacity .65s ease,transform .65s ease;
}
.slide.in{opacity:1;transform:translateY(0)}

.slide-num{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted);
  letter-spacing:0.12em;margin-bottom:28px;
  display:flex;align-items:center;gap:10px;
}
.slide-num::after{content:'';display:inline-block;width:36px;height:1px;background:var(--muted)}

/* TYPOGRAPHY */
.display{
  font-family:'Instrument Serif',serif;
  font-size:clamp(44px,6vw,80px);
  font-weight:400;line-height:1.0;
  margin-bottom:20px;letter-spacing:-0.01em;
}
.display em{font-style:italic;color:var(--accent)}
.body-lg{font-size:15px;color:var(--muted);line-height:1.75;margin-bottom:28px}
.label{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;font-weight:500;
}
.tag{
  display:inline-flex;font-family:'DM Mono',monospace;
  font-size:10px;padding:3px 9px;border-radius:4px;
  letter-spacing:0.05em;font-weight:500;
}
.tag-accent{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.tag-ink{background:rgba(13,13,11,0.06);color:var(--ink2)}
.tag-warm{background:rgba(232,168,56,0.1);color:#A0681A}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;max-width:1160px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}
.g2-wide{display:grid;grid-template-columns:1fr 1.3fr;gap:64px;align-items:start;max-width:1160px}

/* CARDS */
.card{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:14px;
  padding:22px 26px;
  margin-bottom:14px;
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.07)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-top,var(--accent))}
.card:last-child{margin-bottom:0}

.build-card{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:14px;
  padding:26px;
  position:relative;overflow:hidden;
  transition:transform .25s,box-shadow .25s;
}
.build-card:hover{transform:translateY(-4px);box-shadow:0 20px 56px rgba(0,0,0,0.09)}
.build-num{
  font-family:'Instrument Serif',serif;
  font-size:52px;color:var(--line);
  line-height:1;margin-bottom:14px;
}
.build-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.3}
.build-body{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}

/* PROOF TABLE */
.proof-table{
  background:var(--white);border:1px solid var(--line);
  border-radius:14px;overflow:hidden;
}
.pt-head{
  background:var(--ink);color:var(--cream);
  padding:12px 18px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;
}
.pt-section{
  padding:6px 18px;
  background:var(--accent-dim);
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--accent);
  border-bottom:1px solid var(--line2);
}
.pt-row{
  display:grid;grid-template-columns:1fr 1fr 80px;
  border-bottom:1px solid var(--line2);
}
.pt-row:last-child{border-bottom:none}
.pt-cell{
  padding:11px 18px;font-size:12px;
  border-right:1px solid var(--line2);
}
.pt-cell:last-child{border-right:none;color:var(--accent);font-weight:600;font-family:'DM Mono',monospace;text-align:right}
.pt-cell:first-child{color:var(--muted)}

/* PROOF ITEMS */
.proof-co{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:6px;
}
.proof-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px}
.proof-body{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.proof-nums{display:flex;gap:28px;flex-wrap:wrap}
.pnum-val{
  font-family:'Instrument Serif',serif;
  font-size:28px;font-weight:400;color:var(--ink);
}
.pnum-label{font-size:11px;color:var(--muted);margin-top:2px}
.proof-item{padding:24px 0;border-bottom:1px solid var(--line2)}
.proof-item:first-child{padding-top:0}
.proof-item:last-child{border-bottom:none}

/* TIMELINE */
.timeline{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:20px;margin-top:40px;
}
.tl-card{
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:28px 24px;
  background:rgba(255,255,255,0.04);
  transition:background .2s,border-color .2s;
}
.tl-card:hover{background:rgba(255,255,255,0.07);border-color:var(--accent-border)}
.tl-badge{
  display:inline-block;font-family:'DM Mono',monospace;
  font-size:10px;padding:4px 10px;border-radius:100px;
  margin-bottom:18px;letter-spacing:0.06em;
}
.tl-title{
  font-family:'Instrument Serif',serif;
  font-size:20px;color:var(--cream);
  margin-bottom:14px;line-height:1.2;
}
.tl-list{list-style:none}
.tl-list li{
  font-size:12.5px;color:rgba(244,240,232,0.5);
  line-height:1.65;padding:5px 0 5px 16px;
  position:relative;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.tl-list li:last-child{border-bottom:none}
.tl-list li::before{
  content:'→';position:absolute;left:0;
  color:var(--accent);font-size:11px;top:7px;
}
.tl-outcome{
  margin-top:14px;padding:9px 12px;
  background:var(--accent-dim);
  border:1px solid var(--accent-border);
  border-radius:7px;font-size:11.5px;
  color:var(--accent);font-weight:500;
}

/* DARK SLIDE */
.slide-dark{background:var(--ink);color:var(--cream)}
.slide-dark .slide-num{color:rgba(244,240,232,0.3)}
.slide-dark .slide-num::after{background:rgba(244,240,232,0.15)}
.slide-dark .display{color:var(--cream)}
.slide-dark .body-lg{color:rgba(244,240,232,0.45)}

/* ASK SLIDE */
.ask-center{
  max-width:680px;margin:0 auto;text-align:center;
}
.ask-display{
  font-family:'Instrument Serif',serif;
  font-size:clamp(48px,6vw,80px);
  line-height:1.0;margin-bottom:24px;
}
.ask-display em{font-style:italic;color:var(--accent)}
.ask-sub{
  font-size:15px;color:var(--muted);
  line-height:1.75;margin-bottom:36px;
  max-width:480px;margin-left:auto;margin-right:auto;
}
.ask-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.btn-p{
  display:inline-flex;align-items:center;gap:7px;
  padding:13px 28px;border-radius:100px;
  background:var(--ink);color:var(--cream);
  font-size:13px;font-weight:500;
  text-decoration:none;transition:all .15s;
}
.btn-p:hover{background:var(--accent);transform:translateY(-2px)}
.btn-g{
  display:inline-flex;align-items:center;gap:7px;
  padding:13px 28px;border-radius:100px;
  border:1px solid var(--line);color:var(--muted);
  font-size:13px;font-weight:500;
  text-decoration:none;transition:all .15s;
}
.btn-g:hover{border-color:var(--accent-border);color:var(--accent);transform:translateY(-2px)}
.sig-row{
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding-top:32px;border-top:1px solid var(--line);
}
.sig-av{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent) 0%,#007A65 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:16px;color:var(--cream);
}
.sig-name{font-size:14px;font-weight:600}
.sig-role{font-size:11px;color:var(--muted);margin-top:2px}
.sig-links{display:flex;gap:12px;margin-top:4px}
.sig-links a{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--accent);text-decoration:none;letter-spacing:0.05em;
}

/* QUOTE */
.blockquote{
  border-left:3px solid var(--accent);
  padding-left:20px;margin:24px 0;
  font-family:'Instrument Serif',serif;
  font-size:clamp(16px,2vw,22px);
  font-style:italic;color:var(--ink);line-height:1.55;
}
.blockquote cite{
  display:block;font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted);
  font-style:normal;margin-top:10px;letter-spacing:0.05em;
}

/* SCROLL BAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

@media(max-width:900px){
  nav{padding:14px 20px}
  .slide{padding:100px 20px 60px}
  .g2,.g2-wide,.g3,.timeline{grid-template-columns:1fr;gap:20px}
}
</style>
</head>

// CURSOR
const cur = document.getElementById('cur');
cur.style.background = CONFIG.accent;
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
});
document.querySelectorAll('a,button').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});

// PROGRESS
const prog = document.getElementById('prog');
prog.style.background = CONFIG.accent;
window.addEventListener('scroll', () => {
  prog.style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + '%';
});

// FADE IN
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.07 });
document.querySelectorAll('.slide').forEach(s => obs.observe(s));
